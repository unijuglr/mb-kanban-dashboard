version: '3.8'

services:
  neo4j:
    image: neo4j:5.26.0
    container_name: oln-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password # Default: user needs to change on first login or via env
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - /Volumes/hellastuff/oln/neo4j/data:/data
      - /Volumes/hellastuff/oln/neo4j/logs:/logs
      - /Volumes/hellastuff/oln/neo4j/import:/var/lib/neo4j/import
      - /Volumes/hellastuff/oln/neo4j/plugins:/plugins
    networks:
      - oln-network
    restart: unless-stopped

  temporal-postgresql:
    image: postgres:13
    container_name: oln-temporal-postgresql
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    volumes:
      - /Volumes/hellastuff/oln/temporal/postgres-data:/var/lib/postgresql/data
    networks:
      - oln-network
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: oln-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
    depends_on:
      - temporal-postgresql
    networks:
      - oln-network
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: oln-temporal-ui
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - oln-network
    restart: unless-stopped

networks:
  oln-network:
    driver: bridge
